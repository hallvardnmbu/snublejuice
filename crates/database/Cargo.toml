[package]
name = "database"
description = "Interactions with the database."
version = "0.1.0"
edition = "2024"

[dependencies]
core = { version = "0.1.0", path = "../core" }
mongodb = "3.5.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.20.0", features = [ "rt-multi-thread", "macros" ]}

[dev-dependencies]
tokio = { version = "1.20.0", features = ["full"] }
